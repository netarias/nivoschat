<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Rank Generator | Modern Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        /* CSS Değişkenleri & Tema Ayarları */
        :root {
            --primary: #6c5ce7;
            --primary-hover: #a29bfe;
            --bg-gradient-1: #0f2027;
            --bg-gradient-2: #203a43;
            --bg-gradient-3: #2c5364;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f5f6fa;
            --text-muted: #b2bec3;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(-45deg, var(--bg-gradient-1), var(--bg-gradient-2), var(--bg-gradient-3), #2d3436);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            padding: 20px;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Glassmorphism Ana Konteyner */
        .app-container {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 1000px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
        }

        /* Sol Taraf - Önizleme Alanı */
        .preview-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 16px;
            padding: 30px;
            border: 1px dashed rgba(255, 255, 255, 0.2);
            position: relative;
        }

        .preview-title {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
            font-weight: 600;
        }

        /* Saydamlık efekti veren arka plan (Photoshop tarzı) */
        .canvas-wrapper {
            background-image: 
                linear-gradient(45deg, #1a1a1a 25%, transparent 25%), 
                linear-gradient(-45deg, #1a1a1a 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, #1a1a1a 75%), 
                linear-gradient(-45deg, transparent 75%, #1a1a1a 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
            background-color: #222;
            padding: 30px;
            border-radius: 12px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: auto;
            max-width: 100%;
        }

        canvas {
            image-rendering: pixelated; /* Pikselleri keskin tutar */
            max-width: 100%;
            height: auto;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.3));
        }

        /* Sağ Taraf - Kontrol Paneli */
        .controls-section {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 800;
            background: -webkit-linear-gradient(#fff, #a29bfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        .header p {
            color: var(--text-muted);
            font-size: 14px;
        }

        /* Modern Input Grupları */
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-group label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px 20px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            border-radius: 12px;
            font-family: 'Press Start 2P', cursive;
            font-size: 14px;
            transition: all 0.3s ease;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(108, 92, 231, 0.3);
        }

        /* Renk Kontrolleri */
        .color-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .color-picker-wrap {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.2);
            padding: 10px 15px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .color-picker-wrap span {
            font-size: 14px;
            font-weight: 600;
        }

        input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            background: transparent;
        }

        input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0;
        }

        input[type="color"]::-webkit-color-swatch {
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 50%;
        }

        /* Range Slider (Kaydırıcılar) */
        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            outline: none;
            margin-top: 10px;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--primary);
            cursor: pointer;
            box-shadow: 0 0 10px rgba(108, 92, 231, 0.5);
            transition: transform 0.1s;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        /* Hazır Preset Butonları */
        .preset-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 5px;
        }

        .preset-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .preset-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
        }

        /* Download Butonu */
        .download-btn {
            background: linear-gradient(135deg, var(--primary), #a29bfe);
            color: white;
            border: none;
            padding: 18px;
            font-size: 16px;
            font-weight: 800;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 10px 20px rgba(108, 92, 231, 0.3);
            margin-top: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .download-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(108, 92, 231, 0.5);
        }

        .download-btn:active {
            transform: translateY(1px);
        }

        /* Mobil Uyumluluk */
        @media (max-width: 900px) {
            .app-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div class="app-container">
    
    <div class="preview-section">
        <div class="preview-title">Canlı Önizleme</div>
        <div class="canvas-wrapper">
            <canvas id="rankCanvas"></canvas>
        </div>
    </div>

    <div class="controls-section">
        <div class="header">
            <h1>Rank Generator</h1>
            <p>Profesyonel Minecraft sunucuları için.</p>
        </div>

        <div class="input-group">
            <label>Rank İsmi</label>
            <input type="text" id="rankText" value="PROFESYONEL">
        </div>

        <div class="color-grid">
            <div class="input-group">
                <label>Arkaplan (Sol)</label>
                <div class="color-picker-wrap">
                    <span>Renk 1</span>
                    <input type="color" id="bgGrad1" value="#6b3fa0">
                </div>
            </div>
            <div class="input-group">
                <label>Arkaplan (Sağ)</label>
                <div class="color-picker-wrap">
                    <span>Renk 2</span>
                    <input type="color" id="bgGrad2" value="#a266cc">
                </div>
            </div>
            <div class="input-group">
                <label>Yazı Rengi</label>
                <div class="color-picker-wrap">
                    <span>Metin</span>
                    <input type="color" id="textColor" value="#ffffff">
                </div>
            </div>
            <div class="input-group">
                <label>Çerçeve Rengi</label>
                <div class="color-picker-wrap">
                    <span>Border</span>
                    <input type="color" id="borderColor" value="#3b1f5e">
                </div>
            </div>
        </div>

        <div class="input-group">
            <label>Yazı Boyutu: <span id="sizeValue">24</span>px</label>
            <input type="range" id="fontSize" min="16" max="72" value="24">
        </div>

        <div class="input-group">
            <label>İç Boşluk (Padding): <span id="padValue">10</span>px</label>
            <input type="range" id="padding" min="4" max="40" value="10">
        </div>

        <div class="input-group">
            <label>Hazır Tasarımlar</label>
            <div class="preset-grid">
                <button class="preset-btn" onclick="applyPreset('profesyonel')">Mor Pro</button>
                <button class="preset-btn" onclick="applyPreset('padisah')">Mavi Padişah</button>
                <button class="preset-btn" onclick="applyPreset('kurucu')">Kızıl Kurucu</button>
                <button class="preset-btn" onclick="applyPreset('vip')">Altın VIP</button>
                <button class="preset-btn" onclick="applyPreset('emerald')">Zümrüt</button>
                <button class="preset-btn" onclick="applyPreset('dark')">Dark Obsidian</button>
            </div>
        </div>

        <button class="download-btn" id="downloadBtn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
            Tasarımı İndir
        </button>
    </div>

</div>

<script>
    // Tuval ve Context Kurulumu
    const canvas = document.getElementById('rankCanvas');
    const ctx = canvas.getContext('2d');

    // Element Referansları
    const els = {
        text: document.getElementById('rankText'),
        bg1: document.getElementById('bgGrad1'),
        bg2: document.getElementById('bgGrad2'),
        textColor: document.getElementById('textColor'),
        borderColor: document.getElementById('borderColor'),
        fontSize: document.getElementById('fontSize'),
        padding: document.getElementById('padding'),
        sizeVal: document.getElementById('sizeValue'),
        padVal: document.getElementById('padValue'),
    };

    // Preset Veritabanı (Gönderdiğin resimlere göre tasarlandı)
    const presets = {
        profesyonel: { bg1: '#5a34e0', bg2: '#a463d6', text: '#ffffff', border: '#2b1b54', size: 24, pad: 8 },
        padisah: { bg1: '#3498db', bg2: '#85c1e9', text: '#ffffff', border: '#1b4f72', size: 24, pad: 8 },
        kurucu: { bg1: '#c0392b', bg2: '#e74c3c', text: '#ffffff', border: '#641e16', size: 24, pad: 8 },
        vip: { bg1: '#d4af37', bg2: '#f1c40f', text: '#ffffff', border: '#7e6615', size: 24, pad: 8 },
        emerald: { bg1: '#2ecc71', bg2: '#58d68d', text: '#ffffff', border: '#145a32', size: 24, pad: 8 },
        dark: { bg1: '#1c2833', bg2: '#2c3e50', text: '#f39c12', border: '#000000', size: 24, pad: 10 }
    };

    // Preset Uygulama Fonksiyonu
    window.applyPreset = function(name) {
        const p = presets[name];
        if(!p) return;
        
        els.bg1.value = p.bg1;
        els.bg2.value = p.bg2;
        els.textColor.value = p.text;
        els.borderColor.value = p.border;
        els.fontSize.value = p.size;
        els.padding.value = p.pad;
        
        els.sizeVal.innerText = p.size;
        els.padVal.innerText = p.pad;
        
        if(name === 'profesyonel') els.text.value = 'PROFESYONEL';
        if(name === 'padisah') els.text.value = 'PADISAH';
        
        drawCanvas();
    };

    // Çizim Motoru (Otomatik Boyutlanan Canvas)
    function drawCanvas() {
        const text = els.text.value || ' ';
        const fontSize = parseInt(els.fontSize.value);
        const padding = parseInt(els.padding.value);
        
        // Fontu ayarla ki ölçüm yapabilelim
        ctx.font = `${fontSize}px 'Press Start 2P', monospace`;
        
        // Metin genişliğini ölç
        const textMetrics = ctx.measureText(text);
        const textWidth = textMetrics.width;
        
        // Canvas boyutlarını dinamik olarak ayarla
        canvas.width = textWidth + (padding * 2);
        canvas.height = fontSize + (padding * 2);

        // Canvas boyutu değiştiğinde font sıfırlanır, tekrar ayarlıyoruz
        ctx.font = `${fontSize}px 'Press Start 2P', monospace`;
        ctx.textBaseline = 'middle';
        ctx.textAlign = 'center';

        // 1. Arkaplan Gradient Çizimi
        const gradient = ctx.createLinearGradient(0, 0, canvas.width, 0);
        gradient.addColorStop(0, els.bg1.value);
        gradient.addColorStop(1, els.bg2.value);
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 2. Dış Çerçeve Çizimi
        ctx.strokeStyle = els.borderColor.value;
        ctx.lineWidth = 4; // Çerçeve kalınlığı
        ctx.strokeRect(2, 2, canvas.width - 4, canvas.height - 4);

        const centerX = canvas.width / 2;
        // Fontun dikey hizalamasını düzeltmek için ufak bir sapma ekliyoruz
        const centerY = (canvas.height / 2) + (fontSize * 0.1); 

        // 3. Metin Gölgelendirmesi (Minecraft tarzı sert gölge)
        ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
        // Gölge offsetini font boyutuna göre dinamik yapıyoruz
        const shadowOffset = Math.max(2, fontSize * 0.08); 
        ctx.fillText(text, centerX + shadowOffset, centerY + shadowOffset);

        // 4. Ana Metin
        ctx.fillStyle = els.textColor.value;
        ctx.fillText(text, centerX, centerY);
    }

    // Event Dinleyicileri (Gerçek zamanlı tepki için)
    Object.values(els).forEach(el => {
        el.addEventListener('input', (e) => {
            // Slider metinlerini güncelle
            if(e.target.id === 'fontSize') els.sizeVal.innerText = e.target.value;
            if(e.target.id === 'padding') els.padVal.innerText = e.target.value;
            drawCanvas();
        });
    });

    // İndirme İşlemi
    document.getElementById('downloadBtn').addEventListener('click', () => {
        const link = document.createElement('a');
        const safeName = (els.text.value || 'rank').replace(/[^a-z0-9]/gi, '_').toLowerCase();
        link.download = `rank_${safeName}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
    });

    // Fontların yüklendiğinden emin ol ve ilk çizimi yap
    document.fonts.ready.then(() => {
        // Sayfa açıldığında varsayılan olarak Profesyonel presetini yükle
        applyPreset('profesyonel');
    });

</script>
</body>
</html>
