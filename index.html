<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NivoChat Ultimate v2</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #0b0f1a; --bg-panel: #161b2c; --bg-hover: #232a42;
            --primary: #8b5cf6; --primary-light: #a78bfa;
            --success: #10b981; --danger: #f43f5e;
            --text-main: #f1f5f9; --text-muted: #94a3b8;
            --glass: rgba(255, 255, 255, 0.03);
        }

        * { box-sizing: border-box; transition: all 0.2s ease; }
        body { margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg-main); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }

        /* GİRİŞ EKRANI */
        #auth-screen { position: fixed; inset: 0; background: radial-gradient(circle at center, #1e1b4b, #0b0f1a); display: flex; justify-content: center; align-items: center; z-index: 2000; }
        .auth-box { background: var(--bg-panel); padding: 40px; border-radius: 24px; width: 360px; border: 1px solid var(--glass); box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); text-align: center; }
        
        /* APP LAYOUT */
        #app-container { display: none; width: 100%; height: 100%; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        /* SIDEBAR */
        #sidebar { width: 300px; background: var(--bg-panel); border-right: 1px solid var(--glass); display: flex; flex-direction: column; }
        .sidebar-header { padding: 25px; font-weight: 800; letter-spacing: 1px; color: var(--primary-light); font-size: 1.4em; }
        .nav-btn { padding: 12px 20px; margin: 4px 15px; border-radius: 12px; cursor: pointer; color: var(--text-muted); display: flex; align-items: center; gap: 12px; }
        .nav-btn:hover, .nav-btn.active { background: var(--glass); color: white; }

        #friends-list { flex: 1; overflow-y: auto; padding: 10px; }
        .friend-item { padding: 12px; border-radius: 14px; cursor: pointer; display: flex; align-items: center; gap: 15px; margin-bottom: 5px; position: relative; }
        .friend-item:hover { background: var(--bg-hover); }
        .status-dot { width: 12px; height: 12px; border-radius: 50%; background: #475569; border: 2.5px solid var(--bg-panel); position: absolute; left: 38px; bottom: 12px; }
        .status-dot.online { background: var(--success); box-shadow: 0 0 10px var(--success); }

        .avatar { width: 42px; height: 42px; background: linear-gradient(135deg, var(--primary), var(--primary-light)); border-radius: 14px; display: flex; align-items: center; justify-content: center; font-weight: 800; }

        /* MAIN AREA */
        #main-area { flex: 1; display: flex; flex-direction: column; background: #0f1423; }
        .top-bar { height: 70px; background: rgba(22, 27, 44, 0.7); backdrop-filter: blur(10px); display: flex; align-items: center; padding: 0 30px; border-bottom: 1px solid var(--glass); justify-content: space-between; }

        /* MESSAGES */
        #chat-messages { flex: 1; overflow-y: auto; padding: 30px; display: flex; flex-direction: column; gap: 10px; scroll-behavior: smooth; }
        .msg { display: flex; flex-direction: column; max-width: 70%; animation: msgSlide 0.3s ease; }
        @keyframes msgSlide { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .msg.me-align { align-self: flex-end; }
        .msg-text { background: var(--bg-panel); padding: 12px 18px; border-radius: 18px; line-height: 1.5; border: 1px solid var(--glass); position: relative; }
        .msg.me-align .msg-text { background: var(--primary); border: none; }

        /* REPLY STYLE */
        .reply-box { font-size: 0.8em; background: rgba(0,0,0,0.2); padding: 5px 10px; border-radius: 8px; border-left: 3px solid var(--primary-light); margin-bottom: 4px; color: var(--text-muted); cursor: pointer; }

        /* CONTEXT MENU (SAĞ TIK) */
        #context-menu { position: fixed; background: var(--bg-panel); border: 1px solid var(--bg-hover); border-radius: 12px; display: none; flex-direction: column; min-width: 150px; z-index: 3000; box-shadow: 0 10px 25px rgba(0,0,0,0.5); overflow: hidden; }
        .menu-item { padding: 12px 16px; font-size: 0.9em; cursor: pointer; }
        .menu-item:hover { background: var(--primary); }

        /* INPUT AREA */
        #chat-input-area { padding: 25px; }
        .reply-preview { display: none; background: var(--bg-panel); padding: 10px 20px; border-radius: 12px 12px 0 0; border-bottom: 1px solid var(--glass); justify-content: space-between; align-items: center; }
        .input-wrapper { display: flex; background: var(--bg-panel); border-radius: 16px; padding: 10px 15px; gap: 15px; align-items: center; border: 1px solid var(--glass); }
        .input-wrapper input { flex: 1; background: transparent; border: none; color: white; outline: none; font-size: 1em; }

        /* UI ELEMENTS */
        .btn { border: none; padding: 12px 20px; border-radius: 12px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .primary { background: var(--primary); color: white; }
        .primary:hover { background: var(--primary-hover); transform: translateY(-2px); }
        .input-field { background: var(--bg-main); border: 1px solid var(--glass); color: white; padding: 12px; border-radius: 12px; outline: none; width: 100%; margin-bottom: 15px; }

        /* MODAL */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); z-index: 2500; align-items: center; justify-content: center; }
        .modal-content { background: var(--bg-panel); padding: 40px; border-radius: 24px; width: 450px; border: 1px solid var(--glass); transform: scale(1); animation: modalIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
        @keyframes modalIn { from { transform: scale(0.8); opacity: 0; } }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--bg-hover); border-radius: 10px; }
    </style>
</head>
<body onclick="hideMenu()" oncontextmenu="return false;">

    <div id="auth-screen">
        <div class="auth-box">
            <h1 style="color:var(--primary); margin-bottom:10px;">NivoChat</h1>
            <p style="color:var(--text-muted); margin-bottom:30px;">Hızlı, Güvenli, Modern.</p>
            <input type="text" id="auth-user" class="input-field" placeholder="Kullanıcı Adı">
            <input type="password" id="auth-pass" class="input-field" placeholder="Şifre">
            <button class="btn primary" style="width:100%" onclick="girisYap()">Giriş Yap</button>
            <p style="margin-top:20px; font-size:0.9em; color:var(--text-muted)">
                Hesabın yok mu? <a href="#" onclick="kayitOl()" style="color:var(--primary)">Kayıt Ol</a>
            </p>
        </div>
    </div>

    <div id="app-container">
        <div id="sidebar">
            <div class="sidebar-header">NIVOCHAT</div>
            <div class="nav-btn active" id="btn-home" onclick="showPanel('home-panel')"><span>🏠</span> Ana Sayfa</div>
            <div style="padding:20px 25px 10px; font-size:0.75em; color:var(--text-muted); font-weight:800; opacity:0.5;">MESAJLAR</div>
            <div id="friends-list"></div>
            
            <div id="my-profile-card" style="padding:20px; background:var(--glass); display:flex; align-items:center; gap:15px; cursor:pointer;" onclick="openProfileModal(myName)">
                <div class="avatar" id="my-avatar-display">?</div>
                <div style="flex:1">
                    <div id="my-name-display" style="font-weight:700;">...</div>
                    <div style="font-size:0.75em; color:var(--success)">● Çevrimiçi</div>
                </div>
            </div>
        </div>

        <div id="main-area">
            <div class="top-bar">
                <div style="display:flex; align-items:center; gap:15px;">
                    <div id="active-avatar" class="avatar" style="width:35px; height:35px; display:none;"></div>
                    <span id="top-bar-title" style="font-weight:700; font-size:1.1em;">Hoş Geldin</span>
                </div>
                <div id="online-status-header" style="font-size:0.85em;"></div>
            </div>

            <div id="home-panel" class="panel active" style="padding:40px; overflow-y:auto; flex:1;">
                <div style="max-width:600px;">
                    <h2 style="margin-bottom:30px;">Tekrar Merhaba! 🚀</h2>
                    <div style="background:var(--bg-panel); padding:25px; border-radius:20px; border:1px solid var(--glass);">
                        <h4 style="margin-top:0">Yeni Arkadaş Bul</h4>
                        <div style="display:flex; gap:10px;">
                            <input type="text" id="add-friend-input" class="input-field" style="margin-bottom:0" placeholder="Kullanıcı adını yaz...">
                            <button class="btn primary" onclick="istekGonder()">Ekle</button>
                        </div>
                    </div>
                    <h3 style="margin-top:40px;">Gelen İstekler (<span id="req-count">0</span>)</h3>
                    <div id="requests-list"></div>
                </div>
            </div>

            <div id="chat-panel" class="panel" style="display:none; flex:1; flex-direction:column;">
                <div id="chat-messages"></div>
                
                <div id="chat-input-area">
                    <div id="reply-preview" class="reply-preview">
                        <div id="reply-text" style="font-size:0.85em; opacity:0.8;"></div>
                        <span onclick="cancelReply()" style="cursor:pointer; font-weight:800;">✕</span>
                    </div>
                    <div class="input-wrapper">
                        <button class="btn" id="voice-btn" onmousedown="startRecording()" onmouseup="stopRecording()" style="background:transparent; font-size:1.2em;">🎤</button>
                        <input type="text" id="msg-input" placeholder="Bir şeyler yaz..." onkeypress="if(event.key==='Enter') mesajGonder()">
                        <button class="btn primary" onclick="mesajGonder()">Gönder</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="context-menu">
        <div class="menu-item" id="menu-reply" onclick="initReply()">↩ Yanıtla</div>
        <div class="menu-item" id="menu-edit" onclick="initEdit()">✏️ Düzenle</div>
        <div class="menu-item" id="menu-delete" onclick="initDelete()" style="color:var(--danger)">🗑️ Sil</div>
    </div>

    <div id="profile-modal" class="modal">
        <div class="modal-content">
            <div style="display:flex; align-items:center; gap:25px; margin-bottom:30px;">
                <div id="prof-avatar" class="avatar" style="width:80px; height:80px; font-size:2em;">?</div>
                <div>
                    <h2 id="prof-name" style="margin:0">@Kullanıcı</h2>
                    <div id="prof-status" style="color:var(--text-muted); margin-top:5px;">Çevrimdışı</div>
                </div>
            </div>
            <div id="prof-edit-area" style="display:none; margin-bottom:20px;">
                <label style="font-size:0.8em; color:var(--text-muted);">BİYOGRAFİNİ GÜNCELLE</label>
                <input type="text" id="new-bio" class="input-field" style="margin-top:8px;" placeholder="Kendinden bahset...">
                <button class="btn primary" style="width:100%" onclick="biyoGuncelle()">Kaydet</button>
            </div>
            <div style="background:var(--bg-main); padding:20px; border-radius:15px;">
                <p id="prof-bio" style="font-style:italic; margin:0; line-height:1.6;"></p>
            </div>
            <button class="btn" style="width:100%; margin-top:20px; background:var(--bg-hover); color:white;" onclick="closeModal()">Kapat</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBG70J_njlRPdsd_eWS0zxgOVb4r7dNM8s",
            authDomain: "nivochat-6a15e.firebaseapp.com",
            databaseURL: "https://nivochat-6a15e-default-rtdb.firebaseio.com",
            projectId: "nivochat-6a15e",
            storageBucket: "nivochat-6a15e.firebasestorage.app",
            messagingSenderId: "520948298454",
            appId: "1:520948298454:web:bfb57438d4fb79158a4f77"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let myName = "";
        let activeChatId = null;
        let activeChatUser = null;
        let selectedMsgId = null;
        let replyingToId = null;
        let mediaRecorder;
        let audioChunks = [];

        // --- OTOMATİK GİRİŞ KONTROLÜ ---
        window.onload = () => {
            const savedUser = localStorage.getItem('nivo_user');
            const savedPass = localStorage.getItem('nivo_pass');
            if(savedUser && savedPass) {
                document.getElementById('auth-user').value = savedUser;
                document.getElementById('auth-pass').value = savedPass;
                girisYap(true);
            }
        };

        function girisYap(isAuto = false) {
            const user = document.getElementById('auth-user').value.trim();
            const pass = document.getElementById('auth-pass').value.trim();
            
            db.ref(`kullanicilar/${user}`).once('value', snap => {
                if(snap.exists() && snap.val().sifre === pass) {
                    localStorage.setItem('nivo_user', user);
                    localStorage.setItem('nivo_pass', pass);
                    basariliGiris(user);
                } else {
                    if(!isAuto) alert("Hatalı giriş bilgileri!");
                }
            });
        }

        function kayitOl() {
            const user = document.getElementById('auth-user').value.trim();
            const pass = document.getElementById('auth-pass').value.trim();
            if(user.length < 3) return alert("Kullanıcı adı en az 3 karakter olmalı!");
            
            db.ref(`kullanicilar/${user}`).set({ 
                sifre: pass, 
                biyo: "Hey! Ben NivoChat kullanıyorum.", 
                durum: "online" 
            }).then(() => girisYap());
        }

        function basariliGiris(user) {
            myName = user;
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('app-container').style.display = 'flex';
            document.getElementById('my-name-display').innerText = myName;
            document.getElementById('my-avatar-display').innerText = myName[0].toUpperCase();
            
            db.ref(`kullanicilar/${myName}/durum`).set("online");
            db.ref(`kullanicilar/${myName}/durum`).onDisconnect().set("offline");
            baslat();
        }

        function baslat() {
            // Arkadaş Listesi ve Online Takibi (Bug Giderildi)
            db.ref(`arkadaslar/${myName}`).on('value', snap => {
                const list = document.getElementById('friends-list');
                list.innerHTML = "";
                snap.forEach(child => {
                    const friend = child.key;
                    db.ref(`kullanicilar/${friend}/durum`).on('value', st => {
                        const status = st.val();
                        let el = document.getElementById(`friend-${friend}`);
                        if(!el) {
                            const item = document.createElement('div');
                            item.className = 'friend-item';
                            item.id = `friend-${friend}`;
                            item.onclick = () => sohbetBaslat(friend);
                            item.innerHTML = `
                                <div class="avatar">${friend[0].toUpperCase()}</div>
                                <div class="status-dot ${status==='online'?'online':''}"></div>
                                <span style="font-weight:600">${friend}</span>`;
                            list.appendChild(item);
                        } else {
                            el.querySelector('.status-dot').className = `status-dot ${status==='online'?'online':''}`;
                        }
                    });
                });
            });

            // İstek Sayacı
            db.ref(`istekler/${myName}`).on('value', snap => {
                const count = snap.numChildren();
                document.getElementById('req-count').innerText = count;
                const list = document.getElementById('requests-list');
                list.innerHTML = "";
                snap.forEach(c => {
                    list.innerHTML += `
                        <div style="display:flex; justify-content:space-between; align-items:center; background:var(--glass); padding:15px; border-radius:15px; margin-top:10px;">
                            <span><b>${c.key}</b> arkadaşlık isteği gönderdi</span>
                            <div style="display:flex; gap:5px;">
                                <button onclick="istekCevapla('${c.key}', true)" class="btn primary" style="padding:8px 15px;">Onayla</button>
                                <button onclick="istekCevapla('${c.key}', false)" class="btn" style="padding:8px 15px; background:var(--danger);">Reddet</button>
                            </div>
                        </div>`;
                });
            });
        }

        // --- SOHBET VE MESAJLAŞMA ---
        function sohbetBaslat(friend) {
            activeChatUser = friend;
            const users = [myName, friend].sort();
            activeChatId = `${users[0]}_${users[1]}`;
            
            document.getElementById('top-bar-title').innerText = "@" + friend;
            document.getElementById('active-avatar').style.display = 'flex';
            document.getElementById('active-avatar').innerText = friend[0].toUpperCase();
            showPanel('chat-panel');
            
            db.ref(`kullanicilar/${friend}/durum`).on('value', s => {
                const st = s.val();
                const el = document.getElementById('online-status-header');
                el.innerText = st === "online" ? "● Çevrimiçi" : "Çevrimdışı";
                el.style.color = st === "online" ? "var(--success)" : "var(--text-muted)";
            });

            const chatBox = document.getElementById('chat-messages');
            chatBox.innerHTML = "";
            db.ref(`dm_mesajlari/${activeChatId}`).off();
            db.ref(`dm_mesajlari/${activeChatId}`).on('child_added', snap => {
                ekranaMesajBas(snap.key, snap.val());
            });
            db.ref(`dm_mesajlari/${activeChatId}`).on('child_changed', snap => {
                const el = document.getElementById(`text-${snap.key}`);
                if(el) el.innerHTML = snap.val().metin + ` <small style="opacity:0.4">(düzenlendi)</small>`;
            });
            db.ref(`dm_mesajlari/${activeChatId}`).on('child_removed', snap => {
                document.getElementById(`msg-${snap.key}`)?.remove();
            });
        }

        function ekranaMesajBas(id, m) {
            const chatBox = document.getElementById('chat-messages');
            const isMe = m.gonderen === myName;
            
            const msgDiv = document.createElement('div');
            msgDiv.className = `msg ${isMe?'me-align':''}`;
            msgDiv.id = `msg-${id}`;
            msgDiv.oncontextmenu = (e) => showContextMenu(e, id, m.metin, isMe);

            let replyHtml = "";
            if(m.yanitlananId) {
                replyHtml = `<div class="reply-box" onclick="scrollToMsg('${m.yanitlananId}')"><b>Yanıtlanan:</b> ${m.yanitlananMetin.substring(0,30)}...</div>`;
            }

            let content = m.metin ? `<span id="text-${id}">${m.metin}${m.duzenlendi?' <small style="opacity:0.4">(düzenlendi)</small>':''}</span>` : `<audio controls src="${m.ses}"></audio>`;

            msgDiv.innerHTML = `
                ${replyHtml}
                <div class="msg-text">${content}</div>
                <div style="font-size:0.65em; color:var(--text-muted); margin-top:4px; padding:0 5px;">${new Date(m.zaman).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</div>
            `;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function mesajGonder() {
            const inp = document.getElementById('msg-input');
            const metin = inp.value.trim();
            if(!metin) return;

            const msgData = {
                gonderen: myName,
                metin: metin,
                zaman: Date.now()
            };

            if(replyingToId) {
                msgData.yanitlananId = replyingToId;
                msgData.yanitlananMetin = document.getElementById('reply-text').innerText;
            }

            db.ref(`dm_mesajlari/${activeChatId}`).push(msgData);
            inp.value = "";
            cancelReply();
        }

        // --- CONTEXT MENU İŞLEMLERİ ---
        function showContextMenu(e, id, text, isMe) {
            e.preventDefault();
            selectedMsgId = id;
            const menu = document.getElementById('context-menu');
            menu.style.display = 'flex';
            menu.style.left = e.pageX + "px";
            menu.style.top = e.pageY + "px";

            // Sadece kendi mesajlarını silebilir/düzenleyebilirsin
            document.getElementById('menu-edit').style.display = isMe ? 'block' : 'none';
            document.getElementById('menu-delete').style.display = isMe ? 'block' : 'none';
            
            // Yanıtlamak için metni sakla
            menu.dataset.tempText = text;
        }

        function hideMenu() {
            document.getElementById('context-menu').style.display = 'none';
        }

        function initReply() {
            const text = document.getElementById('context-menu').dataset.tempText;
            replyingToId = selectedMsgId;
            document.getElementById('reply-preview').style.display = 'flex';
            document.getElementById('reply-text').innerText = text;
            document.getElementById('msg-input').focus();
        }

        function cancelReply() {
            replyingToId = null;
            document.getElementById('reply-preview').style.display = 'none';
        }

        function initDelete() {
            // Alert yerine sessizce veya modern bir şekilde silme
            db.ref(`dm_mesajlari/${activeChatId}/${selectedMsgId}`).remove();
        }

        function initEdit() {
            const oldText = document.getElementById(`text-${selectedMsgId}`).innerText.replace("(düzenlendi)", "").trim();
            const newText = prompt("Mesajı Düzenle:", oldText);
            if(newText && newText !== oldText) {
                db.ref(`dm_mesajlari/${activeChatId}/${selectedMsgId}`).update({
                    metin: newText,
                    duzenlendi: true
                });
            }
        }

        function scrollToMsg(id) {
            const el = document.getElementById(`msg-${id}`);
            if(el) {
                el.scrollIntoView({ behavior: 'smooth' });
                el.style.boxShadow = "0 0 20px var(--primary)";
                setTimeout(() => el.style.boxShadow = "none", 2000);
            }
        }

        // --- PROFİL MODAL ---
        function openProfileModal(user) {
            const modal = document.getElementById('profile-modal');
            modal.style.display = 'flex';
            document.getElementById('prof-name').innerText = "@" + user;
            document.getElementById('prof-avatar').innerText = user[0].toUpperCase();
            document.getElementById('prof-edit-area').style.display = (user === myName) ? "block" : "none";
            
            db.ref(`kullanicilar/${user}`).once('value', snap => {
                const d = snap.val();
                document.getElementById('prof-bio').innerText = d.biyo || "Henüz bir biyografi yazılmamış.";
                document.getElementById('prof-status').innerText = d.durum === "online" ? "● Çevrimiçi" : "Çevrimdışı";
            });
        }

        function closeModal() {
            document.getElementById('profile-modal').style.display = 'none';
        }

        function biyoGuncelle() {
            const yeni = document.getElementById('new-bio').value;
            if(!yeni) return;
            db.ref(`kullanicilar/${myName}/biyo`).set(yeni);
            document.getElementById('prof-bio').innerText = yeni;
            document.getElementById('new-bio').value = "";
        }

        // --- DİĞER ---
        function showPanel(id) {
            document.querySelectorAll('.panel').forEach(p => p.style.display = 'none');
            document.getElementById(id).style.display = 'flex';
            if(id === 'home-panel') {
                document.getElementById('top-bar-title').innerText = "Ana Sayfa";
                document.getElementById('online-status-header').innerText = "";
                document.getElementById('active-avatar').style.display = 'none';
            }
        }

        function istekGonder() {
            const target = document.getElementById('add-friend-input').value.trim();
            if(!target || target === myName) return;
            db.ref(`istekler/${target}/${myName}`).set(true);
            document.getElementById('add-friend-input').value = "";
            alert("İstek gönderildi!");
        }

        function istekCevapla(kim, ok) {
            if(ok) {
                db.ref(`arkadaslar/${myName}/${kim}`).set(true);
                db.ref(`arkadaslar/${kim}/${myName}`).set(true);
            }
            db.ref(`istekler/${myName}/${kim}`).remove();
        }

        // Ses Kayıt (Geliştirilmiş)
        async function startRecording() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const blob = new Blob(audioChunks, { type: 'audio/webm' });
                    const reader = new FileReader();
                    reader.readAsDataURL(blob);
                    reader.onloadend = () => {
                        db.ref(`dm_mesajlari/${activeChatId}`).push({
                            gonderen: myName, ses: reader.result, zaman: Date.now()
                        });
                    };
                };
                mediaRecorder.start();
                document.getElementById('voice-btn').style.color = 'var(--danger)';
            } catch(e) { alert("Mikrofon izni gerekli!"); }
        }

        function stopRecording() {
            if(mediaRecorder) {
                mediaRecorder.stop();
                document.getElementById('voice-btn').style.color = 'white';
            }
        }
    </script>
</body>
</html>
