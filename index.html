<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netaria Rank Studio | Pro Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00d2ff;
            --bg-gradient-1: #0f2027;
            --bg-gradient-2: #203a43;
            --bg-gradient-3: #2c5364;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f5f6fa;
            --text-muted: #b2bec3;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(-45deg, var(--bg-gradient-1), var(--bg-gradient-2), var(--bg-gradient-3), #2d3436);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .app-container {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 30px;
            width: 100%;
            max-width: 1100px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 30px;
        }

        .preview-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            padding: 40px;
            border: 1px dashed rgba(255, 255, 255, 0.2);
            position: relative;
        }

        .preview-title {
            position: absolute; top: 20px; left: 20px; font-size: 11px;
            text-transform: uppercase; letter-spacing: 2px; color: var(--text-muted); font-weight: 800;
        }

        .canvas-wrapper {
            background-image: linear-gradient(45deg, #111 25%, transparent 25%), linear-gradient(-45deg, #111 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #111 75%), linear-gradient(-45deg, transparent 75%, #111 75%);
            background-size: 15px 15px;
            background-color: #000;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .controls-section {
            display: flex; flex-direction: column; gap: 15px;
            max-height: 85vh; overflow-y: auto; padding-right: 10px;
        }

        .header h1 {
            font-size: 24px; font-weight: 800;
            background: linear-gradient(to right, #fff, var(--primary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .input-group { display: flex; flex-direction: column; gap: 5px; }
        .input-group label { font-size: 11px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; }

        input[type="text"] {
            width: 100%; padding: 12px 15px; background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1); color: white;
            border-radius: 10px; font-family: 'Inter', sans-serif; font-size: 14px; outline: none;
        }

        .color-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .color-picker-wrap {
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(0, 0, 0, 0.3); padding: 8px 12px; border-radius: 8px;
        }

        .preset-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .preset-btn {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ddd; padding: 10px 5px; border-radius: 8px; cursor: pointer;
            font-size: 10px; font-weight: 600; transition: 0.2s; text-align: center;
        }
        .preset-btn:hover { background: var(--primary); color: #000; transform: translateY(-2px); }

        .download-btn {
            background: linear-gradient(135deg, var(--primary), #00a8ff);
            color: #000; border: none; padding: 15px; font-size: 14px;
            font-weight: 800; border-radius: 12px; cursor: pointer; margin-top: 10px; text-transform: uppercase;
        }

        input[type="range"] { -webkit-appearance: none; width: 100%; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 15px; height: 15px; background: var(--primary); border-radius: 50%; cursor: pointer; }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

        @media (max-width: 900px) { .app-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="app-container">
    <div class="preview-section">
        <div class="preview-title">Canlı Önizleme</div>
        <div class="canvas-wrapper">
            <canvas id="rankCanvas"></canvas>
        </div>
    </div>

    <div class="controls-section">
        <div class="header">
            <h1>Netaria Studio</h1>
            <p style="font-size: 12px; color: var(--text-muted);">Sᴍᴀʟʟ Cᴀᴘs Desteğiyle Modern Görünüm.</p>
        </div>

        <div class="input-group">
            <label>Metin (Otomatik Sᴍᴀʟʟ Cᴀᴘs Olur)</label>
            <input type="text" id="rankText" value="MODERATOR" placeholder="Örn: rehber">
        </div>

        <div class="color-grid">
            <div class="input-group"><label>Renk 1</label><div class="color-picker-wrap"><input type="color" id="bgGrad1" value="#2ecc71"></div></div>
            <div class="input-group"><label>Renk 2</label><div class="color-picker-wrap"><input type="color" id="bgGrad2" value="#27ae60"></div></div>
            <div class="input-group"><label>Yazı</label><div class="color-picker-wrap"><input type="color" id="textColor" value="#ffffff"></div></div>
            <div class="input-group"><label>Kenarlık</label><div class="color-picker-wrap"><input type="color" id="borderColor" value="#145a32"></div></div>
        </div>

        <div class="color-grid">
            <div class="input-group"><label>Boyut: <span id="sizeValue">24</span>px</label><input type="range" id="fontSize" min="12" max="60" value="24"></div>
            <div class="input-group"><label>Boşluk: <span id="padValue">10</span>px</label><input type="range" id="padding" min="4" max="30" value="10"></div>
        </div>

        <div class="input-group">
            <label>Hızlı Rank Seçimi</label>
            <div class="preset-grid">
                <button class="preset-btn" onclick="applyPreset('kurucu')">Kurucu</button>
                <button class="preset-btn" onclick="applyPreset('admin')">Admin</button>
                <button class="preset-btn" onclick="applyPreset('mod')">Moderatör</button>
                <button class="preset-btn" onclick="applyPreset('yardimci')">Yardımcı</button>
                <button class="preset-btn" onclick="applyPreset('rehber')">Rehber</button>
                <button class="preset-btn" onclick="applyPreset('drehber')">D.Rehber</button>
                <button class="preset-btn" onclick="applyPreset('vip')">VIP</button>
                <button class="preset-btn" onclick="applyPreset('vipplus')">VIP+</button>
                <button class="preset-btn" onclick="applyPreset('mvip')">MVIP</button>
                <button class="preset-btn" onclick="applyPreset('mvipplus')">MVIP+</button>
                <button class="preset-btn" onclick="applyPreset('oyuncu')">Oyuncu</button>
                <button class="preset-btn" onclick="applyPreset('halk')">Halk</button>
                <button class="preset-btn" onclick="applyPreset('netaria')">NetariaVip</button>
                <button class="preset-btn" onclick="applyPreset('profesyonel')">Pro</button>
                <button class="preset-btn" onclick="applyPreset('padisah')">Padişah</button>
            </div>
        </div>

        <button class="download-btn" id="downloadBtn">TASARIMI PNG OLARAK İNDİR</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('rankCanvas');
    const ctx = canvas.getContext('2d');

    // Small Caps Dönüştürücü Fonksiyonu
    function toSmallCaps(text) {
        const capsMap = {
            'a': 'ᴀ', 'b': 'ʙ', 'c': 'ᴄ', 'd': 'ᴅ', 'e': 'ᴇ', 'f': 'ꜰ', 'g': 'ɢ', 'h': 'ʜ', 
            'i': 'ɪ', 'j': 'ᴊ', 'k': 'ᴋ', 'l': 'ʟ', 'm': 'ᴍ', 'n': 'ɴ', 'o': 'ᴏ', 'p': 'ᴘ', 
            'q': 'ǫ', 'r': 'ʀ', 's': 's', 't': 'ᴛ', 'u': 'ᴜ', 'v': 'ᴠ', 'w': 'ᴡ', 'x': 'x', 
            'y': 'ʏ', 'z': 'ᴢ'
        };
        return text.toLowerCase().split('').map(char => capsMap[char] || char).join('');
    }

    const els = {
        text: document.getElementById('rankText'),
        bg1: document.getElementById('bgGrad1'),
        bg2: document.getElementById('bgGrad2'),
        textColor: document.getElementById('textColor'),
        borderColor: document.getElementById('borderColor'),
        fontSize: document.getElementById('fontSize'),
        padding: document.getElementById('padding'),
        sizeVal: document.getElementById('sizeValue'),
        padVal: document.getElementById('padValue'),
    };

    const presets = {
        kurucu: { bg1: '#ff0000', bg2: '#800000', text: '#ffffff', border: '#440000', name: 'KURUCU' },
        admin: { bg1: '#e67e22', bg2: '#d35400', text: '#ffffff', border: '#6e2c00', name: 'ADMIN' },
        mod: { bg1: '#2ecc71', bg2: '#27ae60', text: '#ffffff', border: '#145a32', name: 'MODERATOR' },
        yardimci: { bg1: '#3498db', bg2: '#2980b9', text: '#ffffff', border: '#1b4f72', name: 'YARDIMCI' },
        rehber: { bg1: '#f1c40f', bg2: '#f39c12', text: '#ffffff', border: '#7e5109', name: 'REHBER' },
        drehber: { bg1: '#1abc9c', bg2: '#16a085', text: '#ffffff', border: '#0e6251', name: 'D.REHBER' },
        vip: { bg1: '#f1c40f', bg2: '#9a7d0a', text: '#ffffff', border: '#4d3d05', name: 'VIP' },
        vipplus: { bg1: '#5dade2', bg2: '#2e86c1', text: '#ffffff', border: '#154360', name: 'VIP+' },
        mvip: { bg1: '#a569bd', bg2: '#8e44ad', text: '#ffffff', border: '#4a235a', name: 'MVIP' },
        mvipplus: { bg1: '#ec7063', bg2: '#cb4335', text: '#ffffff', border: '#641e16', name: 'MVIP+' },
        oyuncu: { bg1: '#bdc3c7', bg2: '#7f8c8d', text: '#ffffff', border: '#2c3e50', name: 'OYUNCU' },
        halk: { bg1: '#95a5a6', bg2: '#34495e', text: '#ffffff', border: '#17202a', name: 'HALK' },
        netaria: { bg1: '#00d2ff', bg2: '#3a7bd5', text: '#ffffff', border: '#003366', name: 'NETARIAVIP' },
        profesyonel: { bg1: '#5a34e0', bg2: '#a463d6', text: '#ffffff', border: '#2b1b54', name: 'PROFESYONEL' },
        padisah: { bg1: '#3498db', bg2: '#85c1e9', text: '#ffffff', border: '#1b4f72', name: 'PADISAH' }
    };

    window.applyPreset = function(id) {
        const p = presets[id];
        els.bg1.value = p.bg1;
        els.bg2.value = p.bg2;
        els.textColor.value = p.text;
        els.borderColor.value = p.border;
        els.text.value = p.name;
        drawCanvas();
    };

    function drawCanvas() {
        const rawText = els.text.value || ' ';
        const scText = toSmallCaps(rawText); // Metni Small Caps'e çevir
        const fontSize = parseInt(els.fontSize.value);
        const padding = parseInt(els.padding.value);
        
        // Font stack: Önce Minecraft fontu, Unicode karakterler için Inter (Sans-Serif)
        ctx.font = `${fontSize}px 'Press Start 2P', 'Inter', sans-serif`;
        const tw = ctx.measureText(scText).width;
        
        canvas.width = tw + (padding * 2);
        canvas.height = fontSize + (padding * 2);

        // Gradyan Arkaplan
        const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
        gradient.addColorStop(0, els.bg1.value);
        gradient.addColorStop(1, els.bg2.value);
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Kenarlık
        ctx.strokeStyle = els.borderColor.value;
        ctx.lineWidth = 4;
        ctx.strokeRect(2, 2, canvas.width - 4, canvas.height - 4);

        // Metin Çizimi
        ctx.font = `${fontSize}px 'Press Start 2P', 'Inter', sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        const x = canvas.width / 2;
        const y = (canvas.height / 2) + (fontSize * 0.1);

        // Gölge
        ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
        ctx.fillText(scText, x + 2, y + 2);

        // Ana Metin
        ctx.fillStyle = els.textColor.value;
        ctx.fillText(scText, x, y);
    }

    Object.values(els).forEach(el => el.addEventListener('input', () => {
        els.sizeVal.innerText = els.fontSize.value;
        els.padVal.innerText = els.padding.value;
        drawCanvas();
    }));

    document.getElementById('downloadBtn').addEventListener('click', () => {
        const link = document.createElement('a');
        link.download = `rank_${els.text.value.toLowerCase()}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
    });

    document.fonts.ready.then(() => drawCanvas());
</script>
</body>
</html>
