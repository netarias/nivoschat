<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NivoChat Ultimate v3 - Grok x Discord</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
    <style>
        :root {
            --bg-main: #0b0f1a; --bg-panel: #161b2c; --bg-hover: #232a42;
            --primary: #8b5cf6; --primary-light: #a78bfa;
            --success: #10b981; --danger: #f43f5e;
            --text-main: #f1f5f9; --text-muted: #94a3b8;
            --glass: rgba(255,255,255,0.08);
        }
        * { box-sizing: border-box; }
        body { margin:0; font-family:'Plus Jakarta Sans',sans-serif; background:var(--bg-main); color:var(--text-main); height:100vh; overflow:hidden; display:flex; }
        #app { display:flex; width:100%; height:100%; }
        #sidebar { width:280px; background:var(--bg-panel); border-right:1px solid var(--glass); display:flex; flex-direction:column; }
        .header { padding:20px 25px; font-size:1.6rem; font-weight:800; color:var(--primary-light); display:flex; align-items:center; gap:8px; }
        .friend-item { padding:12px 20px; display:flex; align-items:center; gap:12px; cursor:pointer; border-radius:12px; margin:4px 8px; position:relative; }
        .friend-item:hover { background:var(--bg-hover); }
        .avatar { width:45px; height:45px; border-radius:50%; background:linear-gradient(135deg,#8b5cf6,#a78bfa); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:1.3rem; flex-shrink:0; }
        .status-dot { position:absolute; width:14px; height:14px; background:#475569; border:3px solid var(--bg-panel); border-radius:50%; left:42px; top:32px; }
        .status-dot.online { background:var(--success); box-shadow:0 0 0 3px rgba(16,185,129,0.3); }
        #main { flex:1; display:flex; flex-direction:column; background:#0f1423; }
        .topbar { height:72px; background:rgba(22,27,44,0.95); backdrop-filter:blur(16px); padding:0 25px; display:flex; align-items:center; gap:15px; border-bottom:1px solid var(--glass); }
        #chat-messages { flex:1; overflow-y:auto; padding:25px 30px; display:flex; flex-direction:column; gap:18px; scroll-behavior:smooth; }
        .msg { max-width:68%; display:flex; gap:12px; }
        .msg.me { margin-left:auto; flex-direction:row-reverse; }
        .msg-avatar { width:36px; height:36px; border-radius:50%; background:linear-gradient(135deg,#8b5cf6,#a78bfa); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:1.1rem; flex-shrink:0; }
        .msg-content { display:flex; flex-direction:column; }
        .msg-name { font-size:0.8rem; opacity:0.6; margin-bottom:2px; }
        .msg-bubble { padding:12px 18px; border-radius:18px; background:var(--bg-panel); position:relative; max-width:100%; }
        .msg.me .msg-bubble { background:linear-gradient(135deg,var(--primary),#7c3aed); color:white; border-bottom-right-radius:4px; }
        .msg:not(.me) .msg-bubble { border-bottom-left-radius:4px; }
        .msg-time { font-size:0.65rem; opacity:0.5; margin-top:4px; }
        .reactions { display:flex; gap:6px; margin-top:6px; flex-wrap:wrap; }
        .reaction { background:rgba(255,255,255,0.1); padding:2px 10px; border-radius:9999px; font-size:0.85rem; cursor:pointer; }
        .typing { font-size:0.85rem; color:var(--text-muted); padding:0 10px; font-style:italic; }
        .input-area { padding:20px 25px; background:var(--bg-panel); border-top:1px solid var(--glass); }
        .input-wrapper { background:#0b0f1a; border-radius:9999px; padding:6px 12px; display:flex; align-items:center; gap:8px; }
        .btn { border:none; background:none; font-size:1.5rem; cursor:pointer; padding:8px; border-radius:50%; }
        .btn:hover { background:rgba(255,255,255,0.1); }
        .primary-btn { background:var(--primary); color:white; border-radius:9999px; padding:10px 28px; font-weight:600; }
        .modal { position:fixed; inset:0; background:rgba(0,0,0,0.9); display:none; align-items:center; justify-content:center; z-index:99999; }
        .modal-content { background:var(--bg-panel); width:440px; border-radius:24px; padding:35px; }
        @keyframes msgIn { from { opacity:0; transform:translateY(15px); } to { opacity:1; transform:translateY(0); } }
    </style>
</head>
<body>
<div id="app">
    <!-- SIDEBAR -->
    <div id="sidebar">
        <div class="header">NIVOCHAT <span style="font-size:0.9rem;opacity:0.5;">v3</span></div>
        <div id="friends-list" style="flex:1;overflow-y:auto;padding:8px;"></div>
        <div onclick="openProfile()" style="padding:20px;border-top:1px solid var(--glass);cursor:pointer;display:flex;gap:15px;align-items:center;">
            <div id="my-avatar" class="avatar"></div>
            <div id="my-name" style="font-weight:700;flex:1;"></div>
        </div>
    </div>

    <!-- MAIN CHAT -->
    <div id="main">
        <div class="topbar">
            <div style="display:flex; align-items:center; gap:15px;">
                <div id="chat-avatar" class="avatar" style="width:42px;height:42px;display:none;"></div>
                <div>
                    <div id="chat-title" style="font-weight:700;font-size:1.25rem;"></div>
                    <div id="chat-status" style="font-size:0.8rem;color:var(--success);"></div>
                </div>
            </div>
            <div style="display:flex;gap:12px;">
                <button onclick="toggleTheme()" class="btn">🌗</button>
                <button onclick="logout()" class="btn">🚪</button>
            </div>
        </div>

        <div id="chat-messages"></div>

        <!-- TYPING INDICATOR -->
        <div id="typing-indicator" class="typing" style="display:none;padding:0 30px 10px;">●●● yazıyor...</div>

        <!-- INPUT -->
        <div class="input-area">
            <div id="reply-preview" style="display:none;background:#232a42;margin-bottom:12px;padding:12px 20px;border-radius:16px 16px 0 0;justify-content:space-between;align-items:center;">
                <div id="reply-text" style="max-width:70%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;"></div>
                <span onclick="cancelReply()" style="cursor:pointer;font-size:1.4rem;">✕</span>
            </div>

            <div class="input-wrapper">
                <button class="btn" onclick="toggleEmojiPicker()">😀</button>
                <button class="btn" onclick="document.getElementById('image-upload').click()">📸</button>
                <input type="file" id="image-upload" accept="image/*" style="display:none;" onchange="sendImage()">
                <input id="msg-input" type="text" placeholder="Mesaj yaz..." style="flex:1;background:transparent;border:none;outline:none;color:white;font-size:1.05rem;" 
                       onkeypress="if(event.key==='Enter') sendMessage()" oninput="handleTyping()">
                <button class="btn" onclick="startVoice()">🎤</button>
                <button onclick="sendMessage()" class="primary-btn">Gönder</button>
            </div>
        </div>
    </div>
</div>

<!-- EMOJI PICKER -->
<div id="emoji-picker" style="position:fixed;bottom:110px;right:40px;background:#161b2c;border-radius:18px;padding:16px;display:none;grid-template-columns:repeat(8,40px);gap:8px;width:340px;box-shadow:0 25px 50px rgba(0,0,0,0.6);z-index:99999;border:1px solid var(--glass);"></div>

<!-- PROFILE MODAL -->
<div id="profile-modal" class="modal">
    <div class="modal-content">
        <h2 id="modal-name" style="margin:0;"></h2>
        <p id="modal-bio" style="margin:15px 0;opacity:0.8;"></p>
        <button onclick="closeModal()" style="width:100%;padding:16px;background:var(--danger);color:white;border:none;border-radius:16px;cursor:pointer;">Çıkış Yap</button>
    </div>
</div>

<script>
// ==================== FIREBASE ====================
const firebaseConfig = {
    apiKey: "AIzaSyBG70J_njlRPdsd_eWS0zxgOVb4r7dNM8s",
    authDomain: "nivochat-6a15e.firebaseapp.com",
    databaseURL: "https://nivochat-6a15e-default-rtdb.firebaseio.com",
    projectId: "nivochat-6a15e",
    storageBucket: "nivochat-6a15e.firebasestorage.app",
    messagingSenderId: "520948298454",
    appId: "1:520948298454:web:bfb57438d4fb79158a4f77"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();
const storage = firebase.storage();

let currentUser = null;
let activeChatUser = null;
let activeChatId = null;
let replyingToId = null;
let typingTimeout = null;

// ==================== AUTH & GİRİŞ ====================
auth.onAuthStateChanged(user => {
    if (user) {
        currentUser = user;
        document.getElementById('my-name').textContent = user.displayName || "Kullanıcı";
        document.getElementById('my-avatar').textContent = (user.displayName || "?")[0].toUpperCase();
        loadFriends();
    } else {
        const email = prompt("E-posta ile giriş yap (veya yeni hesap oluştur):");
        const pass = prompt("Şifre:");
        if (email && pass) {
            auth.signInWithEmailAndPassword(email, pass).catch(() => {
                auth.createUserWithEmailAndPassword(email, pass).then(cred => {
                    cred.user.updateProfile({ displayName: email.split('@')[0] });
                });
            });
        }
    }
});

function logout() { auth.signOut(); location.reload(); }

// ==================== ARKADAŞLAR ====================
function loadFriends() {
    // Gerçek arkadaş listesi + son mesaj (Discord tarzı)
    const list = document.getElementById('friends-list');
    list.innerHTML = `<div style="padding:15px 20px;color:var(--text-muted);font-size:0.8rem;">SOHBETLER</div>`;
    // Demo için birkaç arkadaş ekledim, gerçekte arkadaslar/${currentUser.uid} çekebilirsin
    const demoFriends = ["Ahmet", "Zeynep", "Emre", "Deniz"];
    demoFriends.forEach(f => {
        const item = document.createElement('div');
        item.className = 'friend-item';
        item.innerHTML = `
            <div class="avatar">${f[0]}</div>
            <div style="flex:1">
                <div style="font-weight:600">${f}</div>
                <div style="font-size:0.75rem;opacity:0.6" id="last-${f}">Son mesaj...</div>
            </div>`;
        item.onclick = () => startChat(f);
        list.appendChild(item);
    });
}

// ==================== SOHBET BAŞLAT ====================
function startChat(friend) {
    activeChatUser = friend;
    activeChatId = [currentUser.displayName || "user", friend].sort().join('_');

    document.getElementById('chat-title').innerHTML = `@${friend}`;
    document.getElementById('chat-avatar').style.display = 'flex';
    document.getElementById('chat-avatar').innerText = friend[0];

    const messages = document.getElementById('chat-messages');
    messages.innerHTML = '';

    db.ref(`dm_mesajlari/${activeChatId}`).on('child_added', snap => {
        renderMessage(snap.key, snap.val());
    });

    // Typing listener
    db.ref(`typing/${activeChatId}`).on('value', snap => {
        const typing = snap.val();
        const indicator = document.getElementById('typing-indicator');
        if (typing && Object.keys(typing).some(k => k !== (currentUser.displayName || "user"))) {
            indicator.style.display = 'block';
        } else {
            indicator.style.display = 'none';
        }
    });
}

// ==================== MESAJ RENDER ====================
function renderMessage(id, msg) {
    const isMe = msg.gonderen === (currentUser.displayName || "user");
    const container = document.getElementById('chat-messages');

    const div = document.createElement('div');
    div.className = `msg ${isMe ? 'me' : ''}`;
    div.id = `msg-${id}`;

    let content = '';
    if (msg.type === 'image') {
        content = `<img src="${msg.url}" style="max-width:280px;border-radius:14px;cursor:pointer;" onclick="window.open(this.src)">`;
    } else if (msg.type === 'voice') {
        content = `<audio controls src="${msg.url}"></audio>`;
    } else {
        content = `<div>${msg.text}</div>`;
    }

    let reactionsHTML = '';
    if (msg.reactions) {
        reactionsHTML = `<div class="reactions">`;
        Object.keys(msg.reactions).forEach(em => {
            reactionsHTML += `<span class="reaction" onclick="addReaction('${id}', '${em}')">${em} ${msg.reactions[em]}</span>`;
        });
        reactionsHTML += `</div>`;
    }

    div.innerHTML = `
        ${!isMe ? `<div class="msg-avatar">${activeChatUser[0]}</div>` : ''}
        <div class="msg-content">
            ${!isMe ? `<div class="msg-name">@${activeChatUser}</div>` : ''}
            <div class="msg-bubble">${content}</div>
            ${reactionsHTML}
            <div class="msg-time">${new Date(msg.time).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})} ${isMe ? '✓✓' : ''}</div>
        </div>
    `;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
}

// ==================== MESAJ GÖNDER ====================
function sendMessage() {
    const input = document.getElementById('msg-input');
    const text = input.value.trim();
    if (!text || !activeChatId) return;

    const msgData = {
        gonderen: currentUser.displayName || "user",
        text: text,
        time: Date.now(),
        type: 'text'
    };

    if (replyingToId) {
        msgData.replyTo = replyingToId;
    }

    db.ref(`dm_mesajlari/${activeChatId}`).push(msgData);
    input.value = '';
    cancelReply();
}

// ==================== RESİM GÖNDER ====================
async function sendImage() {
    const file = document.getElementById('image-upload').files[0];
    if (!file || !activeChatId) return;

    const ref = storage.ref(`chats/${activeChatId}/${Date.now()}-${file.name}`);
    await ref.put(file);
    const url = await ref.getDownloadURL();

    db.ref(`dm_mesajlari/${activeChatId}`).push({
        gonderen: currentUser.displayName || "user",
        url: url,
        time: Date.now(),
        type: 'image'
    });
}

// ==================== REAKSİYON ====================
function addReaction(msgId, emoji) {
    const ref = db.ref(`dm_mesajlari/${activeChatId}/${msgId}/reactions/${emoji}`);
    ref.transaction(count => (count || 0) + 1);
}

// ==================== EMOJI PICKER ====================
const emojis = ['❤️','😂','🔥','👍','👎','😍','🥳','😱','🙌','🎉'];
function toggleEmojiPicker() {
    const picker = document.getElementById('emoji-picker');
    if (picker.style.display === 'grid') {
        picker.style.display = 'none';
        return;
    }
    picker.style.display = 'grid';
    picker.innerHTML = '';
    emojis.forEach(em => {
        const span = document.createElement('span');
        span.textContent = em;
        span.style.fontSize = '1.6rem';
        span.style.cursor = 'pointer';
        span.onclick = () => {
            document.getElementById('msg-input').value += em;
            picker.style.display = 'none';
        };
        picker.appendChild(span);
    });
}

// ==================== TYPING INDICATOR ====================
function handleTyping() {
    if (!activeChatId) return;
    const userKey = currentUser.displayName || "user";
    db.ref(`typing/${activeChatId}/${userKey}`).set(true);

    clearTimeout(typingTimeout);
    typingTimeout = setTimeout(() => {
        db.ref(`typing/${activeChatId}/${userKey}`).remove();
    }, 3000);
}

// ==================== SES KAYIT (eski ama çalışıyor) ====================
let mediaRecorder, audioChunks = [];
async function startVoice() {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    mediaRecorder = new MediaRecorder(stream);
    audioChunks = [];
    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
    mediaRecorder.onstop = async () => {
        const blob = new Blob(audioChunks, { type: 'audio/webm' });
        const url = URL.createObjectURL(blob);
        // Gerçekte Storage'a yükle ama demo için direkt base64
        db.ref(`dm_mesajlari/${activeChatId}`).push({
            gonderen: currentUser.displayName || "user",
            url: url,
            time: Date.now(),
            type: 'voice'
        });
    };
    mediaRecorder.start();
}

// ==================== REPLY & DİĞER ====================
function cancelReply() {
    replyingToId = null;
    document.getElementById('reply-preview').style.display = 'none';
}

function openProfile() {
    document.getElementById('profile-modal').style.display = 'flex';
    document.getElementById('modal-name').textContent = currentUser?.displayName || "Profil";
}

function closeModal() {
    document.getElementById('profile-modal').style.display = 'none';
}

function toggleTheme() {
    alert("🌗 Tema değiştirme (tam sürümde aktif olacak - istersen hemen eklerim)");
}

// ==================== BAŞLAT ====================
window.onload = () => console.log('%c🚀 NivoChat v3 - Grok x Discord HAZIR!', 'color:#8b5cf6;font-size:1.3rem;font-weight:800');
</script>
</body>
</html>
