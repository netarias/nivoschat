<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="NovaDesk Studio; ekipler, freelancerlar ve küçük işletmeler için profesyonel çalışma alanı ve masaüstü uygulaması indirme sitesi.">
    <meta name="theme-color" content="#0f172a">
    <meta property="og:title" content="NovaDesk Studio - Modern Çalışma Alanı">
    <meta property="og:description" content="Projelerini, dosyalarını, faturalarını ve ekip akışını tek bir modern masaüstü uygulamasında yönet.">
    <meta property="og:type" content="website">
    <title>NovaDesk Studio | Profesyonel Modern Uygulama Sitesi</title>
    <style>
        :root {
            color-scheme: dark;
            --bg: #08111f;
            --bg-soft: #101b2d;
            --bg-panel: #132033;
            --ink: #f6f9fc;
            --muted: #9fb0c5;
            --line: rgba(255, 255, 255, 0.13);
            --line-strong: rgba(255, 255, 255, 0.22);
            --brand: #35d3b4;
            --brand-strong: #13b99d;
            --accent: #f7b955;
            --danger: #ff6b6b;
            --blue: #5ca8ff;
            --violet: #b58cff;
            --shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
            --shadow-soft: 0 14px 40px rgba(0, 0, 0, 0.24);
            --radius-xs: 6px;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 18px;
            --max: 1180px;
            --nav-h: 74px;
            --font: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        [data-theme="light"] {
            color-scheme: light;
            --bg: #f5f7fb;
            --bg-soft: #ffffff;
            --bg-panel: #eef3f8;
            --ink: #101624;
            --muted: #5e6d81;
            --line: rgba(15, 23, 42, 0.12);
            --line-strong: rgba(15, 23, 42, 0.2);
            --shadow: 0 24px 70px rgba(15, 23, 42, 0.13);
            --shadow-soft: 0 14px 34px rgba(15, 23, 42, 0.1);
        }

        * {
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
            background: var(--bg);
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: var(--font);
            color: var(--ink);
            background: var(--bg);
            line-height: 1.6;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: -3;
            background:
                linear-gradient(130deg, rgba(53, 211, 180, 0.12), transparent 28%),
                linear-gradient(315deg, rgba(92, 168, 255, 0.12), transparent 32%),
                var(--bg);
        }

        body::after {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: -2;
            opacity: 0.32;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.045) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.045) 1px, transparent 1px);
            background-size: 54px 54px;
            mask-image: linear-gradient(to bottom, black, transparent 80%);
        }

        a {
            color: inherit;
            text-decoration: none;
        }
