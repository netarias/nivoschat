<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NivoChat v3</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root{
--bg:#0b0f1a;
--panel:#161b2c;
--hover:#232a42;
--primary:#5865f2;
--text:#f1f5f9;
--muted:#94a3b8;
}

body{margin:0;font-family:Inter;background:var(--bg);color:var(--text);display:flex;height:100vh}

/* SERVER BAR */
#servers{
width:70px;background:#0a0d16;
display:flex;flex-direction:column;align-items:center;padding-top:10px;gap:12px;
}
.server{
width:50px;height:50px;border-radius:16px;background:var(--hover);
display:flex;align-items:center;justify-content:center;cursor:pointer;
}
.server:hover,.server.active{background:var(--primary);}

/* SIDEBAR */
#sidebar{width:260px;background:var(--panel);display:flex;flex-direction:column;}
#friends{flex:1;overflow:auto;padding:10px;}
.friend{padding:10px;border-radius:10px;cursor:pointer}
.friend:hover{background:var(--hover)}

/* CHAT */
#chat{flex:1;display:flex;flex-direction:column;}
#messages{flex:1;overflow:auto;padding:20px;display:flex;flex-direction:column;gap:10px;}

.msg{max-width:65%;position:relative}
.me{align-self:flex-end}
.bubble{padding:10px 15px;border-radius:15px;background:var(--panel)}
.me .bubble{background:var(--primary)}

.msg-actions{
position:absolute;top:-10px;right:0;
background:var(--panel);padding:5px;border-radius:8px;
display:none;gap:5px;font-size:12px;
}
.msg:hover .msg-actions{display:flex}

/* INPUT */
#input{
padding:15px;display:flex;gap:10px;background:var(--panel)
}
#input input{
flex:1;background:none;border:none;color:white;font-size:16px;outline:none;
}
button{background:var(--primary);border:none;padding:10px;border-radius:10px;color:white;cursor:pointer}

#typing{font-size:12px;color:var(--muted);padding-left:20px;height:20px}
</style>
</head>

<body>

<div id="servers">
<div class="server active">💬</div>
<div class="server">🔥</div>
</div>

<div id="sidebar">
<h3 style="padding:15px;margin:0">NivoChat</h3>
<div id="friends"></div>
</div>

<div id="chat">
<div id="messages"></div>
<div id="typing"></div>
<div id="input">
<input id="msg" placeholder="Mesaj yaz...">
<button onclick="send()">Gönder</button>
</div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
firebase.initializeApp({
apiKey:"API_KEY",
databaseURL:"DB_URL"
});
const db=firebase.database();

let me=prompt("Adın:");
let chatId="global";

/* FRIEND LIST MOCK */
["Ahmet","Mehmet","Ayşe"].forEach(f=>{
let d=document.createElement("div");
d.className="friend";
d.innerText=f;
d.onclick=()=>chatId=f;
document.getElementById("friends").appendChild(d);
});

/* SEND */
function send(){
let text=document.getElementById("msg").value;
if(!text)return;

db.ref("chat/"+chatId).push({
user:me,text, time:Date.now()
});
document.getElementById("msg").value="";
}

/* LOAD */
db.ref("chat/"+chatId).on("child_added",snap=>{
render(snap.key,snap.val());
});

/* RENDER */
function render(id,m){
let div=document.createElement("div");
div.className="msg "+(m.user===me?"me":"");

div.innerHTML=`
<div class="msg-actions">
<span onclick="react('${id}','👍')">👍</span>
<span onclick="react('${id}','🔥')">🔥</span>
</div>
<div class="bubble">${m.text}</div>
`;

document.getElementById("messages").appendChild(div);
}

/* REACT */
function react(id,e){
db.ref("chat/"+chatId+"/"+id+"/react/"+e+"/"+me).set(true);
}

/* TYPING */
let t;
document.getElementById("msg").addEventListener("input",()=>{
db.ref("typing/"+chatId+"/"+me).set(true);
clearTimeout(t);
t=setTimeout(()=>{
db.ref("typing/"+chatId+"/"+me).remove();
},1000);
});

db.ref("typing/"+chatId).on("value",snap=>{
let txt="";
snap.forEach(c=>{
if(c.key!==me) txt=c.key+" yazıyor...";
});
document.getElementById("typing").innerText=txt;
});
</script>

</body>
</html>
