<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NivoChat Ultimate</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #0f172a; --bg-panel: #1e293b; --bg-hover: #334155;
            --primary: #6366f1; --primary-hover: #4f46e5;
            --success: #10b981; --danger: #ef4444;
            --text-main: #f8fafc; --text-muted: #94a3b8;
        }

        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg-main); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }
        
        /* AUTH & APP */
        #auth-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-main); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .auth-box { background: var(--bg-panel); padding: 40px; border-radius: 16px; width: 320px; text-align: center; border: 1px solid #334155; }
        #app-container { display: none; width: 100%; height: 100%; }

        /* SIDEBAR */
        #sidebar { width: 280px; background: var(--bg-panel); display: flex; flex-direction: column; border-right: 1px solid #0f172a; }
        .sidebar-header { padding: 20px; font-weight: 800; color: var(--primary); font-size: 1.2em; border-bottom: 1px solid #0f172a; }
        .nav-btn { padding: 12px 20px; margin: 8px 12px; border-radius: 8px; cursor: pointer; color: var(--text-muted); display: flex; align-items: center; gap: 10px; font-weight: 600; }
        .nav-btn:hover, .nav-btn.active { background: var(--bg-hover); color: white; }
        
        #friends-list { flex: 1; overflow-y: auto; }
        .friend-item { padding: 10px 15px; margin: 2px 12px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 12px; font-weight: 600; position: relative; }
        .friend-item:hover { background: var(--bg-hover); }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; background: gray; border: 2px solid var(--bg-panel); position: absolute; left: 40px; bottom: 8px; }
        .status-dot.online { background: var(--success); }

        .friend-avatar, .my-avatar { width: 36px; height: 36px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.8em; font-weight: 800; }

        #my-profile-card { padding: 15px 20px; background: rgba(0,0,0,0.2); border-top: 1px solid #0f172a; display: flex; align-items: center; gap: 12px; cursor: pointer; }

        /* MAIN AREA */
        #main-area { flex: 1; display: flex; flex-direction: column; }
        .top-bar { height: 60px; background: rgba(30, 41, 59, 0.8); border-bottom: 1px solid var(--bg-panel); display: flex; align-items: center; padding: 0 25px; font-weight: 600; justify-content: space-between; }
        .panel { display: none; flex: 1; flex-direction: column; padding: 30px; overflow-y: auto; }
        .panel.active { display: flex; }

        /* MESSAGES */
        #chat-messages { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 15px; }
        .msg { display: flex; flex-direction: column; max-width: 80%; position: relative; }
        .msg.me-align { align-self: flex-end; align-items: flex-end; }
        .msg-text { background: var(--bg-panel); padding: 10px 15px; border-radius: 4px 12px 12px 12px; border: 1px solid #334155; position: relative; }
        .msg.me-align .msg-text { background: var(--primary); border: none; border-radius: 12px 4px 12px 12px; }
        
        .msg-ops { font-size: 0.7em; color: var(--text-muted); cursor: pointer; margin-top: 3px; display: none; }
        .msg:hover .msg-ops { display: block; }
        
        /* INPUT AREA */
        #chat-input-area { padding: 20px; background: var(--bg-main); border-top: 1px solid var(--bg-panel); }
        .input-wrapper { display: flex; background: var(--bg-panel); border-radius: 12px; padding: 8px; gap: 10px; }
        .input-wrapper input { flex: 1; background: transparent; border: none; color: white; outline: none; }
        
        /* MODALS */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; }
        .modal-content { background: var(--bg-panel); padding: 30px; border-radius: 16px; width: 350px; border: 1px solid var(--bg-hover); }

        .btn { border: none; padding: 10px 15px; border-radius: 8px; font-weight: 600; cursor: pointer; }
        .primary { background: var(--primary); color: white; }
        .danger { background: var(--danger); color: white; }
        
        .recording { background: var(--danger) !important; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-box">
            <h2 style="color:var(--primary)">NivoChat</h2>
            <input type="text" id="auth-user" class="btn" style="width:90%; background:#0f172a; color:white; margin-bottom:10px;" placeholder="Kullanıcı Adı">
            <input type="password" id="auth-pass" class="btn" style="width:90%; background:#0f172a; color:white; margin-bottom:20px;" placeholder="Şifre">
            <button class="btn primary" style="width:100%; margin-bottom:10px;" onclick="girisYap()">Giriş Yap</button>
            <button class="btn" style="width:100%; background:transparent; border:1px solid var(--primary); color:var(--primary)" onclick="kayitOl()">Kayıt Ol</button>
            <div id="auth-error" style="color:var(--danger); margin-top:10px; font-size:0.8em"></div>
        </div>
    </div>

    <div id="app-container">
        <div id="sidebar">
            <div class="sidebar-header">NIVOCHAT</div>
            <div class="nav-btn active" id="btn-home" onclick="showPanel('home-panel')">🏠 Arkadaşlar</div>
            <div style="padding:15px; font-size:0.7em; color:var(--text-muted)">MESAJLAR</div>
            <div id="friends-list"></div>
            
            <div id="my-profile-card" onclick="openProfileModal(myName)">
                <div class="my-avatar" id="my-avatar-display">?</div>
                <div style="flex:1">
                    <div id="my-name-display">...</div>
                    <div style="font-size:0.7em; color:var(--success)">Çevrimiçi</div>
                </div>
            </div>
        </div>

        <div id="main-area">
            <div class="top-bar">
                <span id="top-bar-title">Hoş Geldin</span>
                <div id="online-status-header" style="font-size:0.8em; color:var(--text-muted)"></div>
            </div>

            <div id="home-panel" class="panel active">
                <div style="background:var(--bg-panel); padding:20px; border-radius:12px; margin-bottom:20px;">
                    <h3>Arkadaş Ekle</h3>
                    <div style="display:flex; gap:10px;">
                        <input type="text" id="add-friend-input" class="btn" style="flex:1; background:var(--bg-main); color:white;" placeholder="Kullanıcı adı...">
                        <button class="btn primary" onclick="istekGonder()">Ekle</button>
                    </div>
                </div>
                <h3>Gelen İstekler (<span id="req-count">0</span>)</h3>
                <div id="requests-list"></div>
            </div>

            <div id="chat-panel" class="panel" style="padding:0; display:none;">
                <div id="chat-messages"></div>
                <div id="chat-input-area">
                    <div class="input-wrapper">
                        <button class="btn" id="voice-btn" onmousedown="startRecording()" onmouseup="stopRecording()" title="Basılı tut konuş">🎤</button>
                        <input type="text" id="msg-input" placeholder="Mesaj yazın..." onkeypress="if(event.key==='Enter') mesajGonder()">
                        <button class="btn primary" onclick="mesajGonder()">Gönder</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="profile-modal" class="modal">
        <div class="modal-content">
            <h2 id="prof-name">Profil</h2>
            <div id="prof-status" style="margin-bottom:20px; color:var(--text-muted)">Durum: -</div>
            <div id="prof-edit-area" style="display:none;">
                <input type="text" id="new-bio" class="btn" style="width:90%; background:var(--bg-main); color:white;" placeholder="Yeni biyografi...">
                <button class="btn primary" style="margin-top:10px;" onclick="biyoGuncelle()">Kaydet</button>
            </div>
            <p id="prof-bio" style="font-style:italic"></p>
            <button class="btn danger" onclick="document.getElementById('profile-modal').style.display='none'">Kapat</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        // CONFIG - AYNI KALIYOR
        const firebaseConfig = {
            apiKey: "AIzaSyBG70J_njlRPdsd_eWS0zxgOVb4r7dNM8s",
            authDomain: "nivochat-6a15e.firebaseapp.com",
            databaseURL: "https://nivochat-6a15e-default-rtdb.firebaseio.com",
            projectId: "nivochat-6a15e",
            storageBucket: "nivochat-6a15e.firebasestorage.app",
            messagingSenderId: "520948298454",
            appId: "1:520948298454:web:bfb57438d4fb79158a4f77"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let myName = "";
        let activeChatId = null;
        let activeChatUser = null;
        let mediaRecorder;
        let audioChunks = [];

        // --- GİRİŞ & DURUM ---
        function girisYap() {
            const user = document.getElementById('auth-user').value.trim();
            const pass = document.getElementById('auth-pass').value.trim();
            db.ref(`kullanicilar/${user}`).once('value', snap => {
                if(snap.exists() && snap.val().sifre === pass) basariliGiris(user);
                else alert("Hatalı giriş!");
            });
        }

        function kayitOl() {
            const user = document.getElementById('auth-user').value.trim();
            const pass = document.getElementById('auth-pass').value.trim();
            if(user.length < 3) return alert("Kısa isim!");
            db.ref(`kullanicilar/${user}`).set({ sifre: pass, biyo: "NivoChat kullanıcısı", durum: "online" });
            basariliGiris(user);
        }

        function basariliGiris(user) {
            myName = user;
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('app-container').style.display = 'flex';
            document.getElementById('my-name-display').innerText = myName;
            document.getElementById('my-avatar-display').innerText = myName[0].toUpperCase();
            
            // Çevrim içi yap
            db.ref(`kullanicilar/${myName}/durum`).set("online");
            db.ref(`kullanicilar/${myName}/durum`).onDisconnect().set("offline");
            
            baslat();
        }

        // --- ANA FONKSİYONLAR ---
        function baslat() {
            // Arkadaş listesi ve online durumu
            db.ref(`arkadaslar/${myName}`).on('value', snap => {
                const list = document.getElementById('friends-list');
                list.innerHTML = "";
                snap.forEach(child => {
                    const friend = child.key;
                    db.ref(`kullanicilar/${friend}/durum`).on('value', st => {
                        const isOnline = st.val() === "online";
                        let el = document.getElementById(`friend-${friend}`);
                        if(!el) {
                            list.innerHTML += `
                                <div class="friend-item" id="friend-${friend}" onclick="sohbetBaslat('${friend}')">
                                    <div class="friend-avatar">${friend[0].toUpperCase()}</div>
                                    <div class="status-dot ${isOnline?'online':''}"></div>
                                    <span>${friend}</span>
                                </div>`;
                        } else {
                            el.querySelector('.status-dot').className = `status-dot ${isOnline?'online':''}`;
                        }
                    });
                });
            });

            // İstekler
            db.ref(`istekler/${myName}`).on('value', snap => {
                const list = document.getElementById('requests-list');
                list.innerHTML = "";
                let count = 0;
                snap.forEach(c => {
                    count++;
                    list.innerHTML += `<div class="btn" style="background:var(--bg-panel); margin-bottom:5px; display:flex; justify-content:space-between">
                        ${c.key} <button onclick="istekCevapla('${c.key}', true)" class="btn primary">Kabul</button>
                    </div>`;
                });
                document.getElementById('req-count').innerText = count;
            });
        }

        function sohbetBaslat(friend) {
            activeChatUser = friend;
            const users = [myName, friend].sort();
            activeChatId = `${users[0]}_${users[1]}`;
            
            document.getElementById('top-bar-title').innerText = "@" + friend;
            showPanel('chat-panel');
            
            // Çevrim içi başlık kontrolü
            db.ref(`kullanicilar/${friend}/durum`).on('value', s => {
                document.getElementById('online-status-header').innerText = s.val() === "online" ? "● Çevrimiçi" : "Çevrimdışı";
            });

            const chatBox = document.getElementById('chat-messages');
            chatBox.innerHTML = "";
            db.ref(`dm_mesajlari/${activeChatId}`).off();
            db.ref(`dm_mesajlari/${activeChatId}`).on('child_added', snap => {
                ekranaMesajBas(snap.key, snap.val());
            });
            db.ref(`dm_mesajlari/${activeChatId}`).on('child_removed', snap => {
                document.getElementById(`msg-${snap.key}`)?.remove();
            });
        }

        function ekranaMesajBas(id, m) {
            const chatBox = document.getElementById('chat-messages');
            const isMe = m.gonderen === myName;
            
            let icerik = m.metin ? `<span>${m.metin}</span>` : `<audio controls src="${m.ses}"></audio>`;
            if(m.duzenlendi) icerik += ` <small style="opacity:0.5">(düzenlendi)</small>`;

            const html = `
                <div class="msg ${isMe?'me-align':''}" id="msg-${id}">
                    <div style="font-size:0.7em; color:var(--text-muted)">${m.gonderen}</div>
                    <div class="msg-text">${icerik}</div>
                    ${isMe ? `
                        <div class="msg-ops">
                            <span onclick="mesajSil('${id}')">Sil</span> | 
                            <span onclick="mesajDuzenle('${id}', '${m.metin}')">Düzenle</span>
                        </div>` : `<div class="msg-ops" onclick="openProfileModal('${m.gonderen}')">Profiline Bak</div>`}
                </div>`;
            chatBox.innerHTML += html;
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // --- MESAJ İŞLEMLERİ ---
        function mesajGonder() {
            const inp = document.getElementById('msg-input');
            if(!inp.value.trim()) return;
            db.ref(`dm_mesajlari/${activeChatId}`).push({
                gonderen: myName, metin: inp.value, zaman: Date.now()
            });
            inp.value = "";
        }

        function mesajSil(id) {
            if(confirm("Mesaj silinsin mi?")) db.ref(`dm_mesajlari/${activeChatId}/${id}`).remove();
        }

        function mesajDuzenle(id, eski) {
            const yeni = prompt("Mesajı düzenle:", eski);
            if(yeni) db.ref(`dm_mesajlari/${activeChatId}/${id}`).update({ metin: yeni, duzenlendi: true });
        }

        // --- SESLİ MESAJ (BASE64 BYPASS) ---
        async function startRecording() {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = () => {
                const blob = new Blob(audioChunks, { type: 'audio/webm' });
                const reader = new FileReader();
                reader.readAsDataURL(blob);
                reader.onloadend = () => {
                    db.ref(`dm_mesajlari/${activeChatId}`).push({
                        gonderen: myName, ses: reader.result, zaman: Date.now()
                    });
                };
            };
            mediaRecorder.start();
            document.getElementById('voice-btn').classList.add('recording');
        }

        function stopRecording() {
            mediaRecorder.stop();
            document.getElementById('voice-btn').classList.remove('recording');
        }

        // --- PROFİL SİSTEMİ ---
        function openProfileModal(user) {
            document.getElementById('profile-modal').style.display = 'flex';
            document.getElementById('prof-name').innerText = "@" + user;
            document.getElementById('prof-edit-area').style.display = (user === myName) ? "block" : "none";
            
            db.ref(`kullanicilar/${user}`).once('value', snap => {
                const d = snap.val();
                document.getElementById('prof-bio').innerText = d.biyo || "Biyografi yok.";
                document.getElementById('prof-status').innerText = "Durum: " + (d.durum === "online" ? "Çevrimiçi" : "Çevrimdışı");
            });
        }

        function biyoGuncelle() {
            const yeni = document.getElementById('new-bio').value;
            db.ref(`kullanicilar/${myName}/biyo`).set(yeni);
            document.getElementById('prof-bio').innerText = yeni;
            alert("Biyografi güncellendi!");
        }

        // --- YARDIMCI ---
        function showPanel(id) {
            document.querySelectorAll('.panel').forEach(p => p.style.display = 'none');
            document.getElementById(id).style.display = 'flex';
            if(id === 'home-panel') {
                document.getElementById('top-bar-title').innerText = "Ana Sayfa";
                document.getElementById('online-status-header').innerText = "";
            }
        }

        function istekGonder() {
            const h = document.getElementById('add-friend-input').value.trim();
            if(h === myName) return;
            db.ref(`istekler/${h}/${myName}`).set(true);
            alert("İstek gitti!");
        }

        function istekCevapla(kim, ok) {
            if(ok) {
                db.ref(`arkadaslar/${myName}/${kim}`).set(true);
                db.ref(`arkadaslar/${kim}/${myName}`).set(true);
            }
            db.ref(`istekler/${myName}/${kim}`).remove();
        }
    </script>
</body>
</html>
